<style>
.theme-filter-wrap { display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px; }
.theme-group { background: white; border: 1px solid #E5E7EB; border-radius: 10px; padding: 16px 20px; }
.theme-group-title { font-weight: 700; font-size: .95rem; margin-bottom: 12px; }
.theme-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid #E5E7EB; background: #F9FAFB;
  cursor: pointer; font-size: .85rem; user-select: none;
  transition: all .15s;
}
.chip:hover { border-color: #2D6A4F; background: #D8F3DC; }
.chip input { accent-color: #2D6A4F; }
.chip input:checked + * { font-weight: 600; }
.chip:has(input:checked) { border-color: #2D6A4F; background: #D8F3DC; color: #1B4332; }
.chip-cnt { font-size: .75rem; color: #6B7280; }
</style>

<script>
let allCamps = [];

(async () => {
  const resp = await fetch('/search_index.json');
  allCamps = await resp.json();
})();

document.querySelectorAll('.chip input').forEach(cb => {
  cb.addEventListener('change', applyFilter);
});
document.querySelectorAll('input[name="filterMode"]').forEach(r => {
  r.addEventListener('change', applyFilter);
});

function applyFilter() {
  const checked = [...document.querySelectorAll('.chip input:checked')];
  if (checked.length === 0) {
    document.getElementById('campGrid').innerHTML = '';
    document.getElementById('campCount').textContent = '시설을 선택하면 캠핑장이 필터링됩니다.';
    return;
  }

  const mode = document.querySelector('input[name="filterMode"]:checked').value;

  const filters = checked.map(cb => ({ field: cb.dataset.field, val: cb.dataset.val }));

  const result = allCamps.filter(c => {
    const matches = filters.map(f => {
      const fieldVal = c[f.field] || '';
      if (f.field === 'animalCmgCl') {
        return fieldVal && fieldVal !== '불가' && fieldVal !== '';
      }
      return fieldVal.includes(f.val);
    });
    return mode === 'AND' ? matches.every(Boolean) : matches.some(Boolean);
  });

  document.getElementById('campCount').textContent = `총 ${result.length}개 캠핑장`;
  renderCamps(result);
}

function resetFilters() {
  document.querySelectorAll('.chip input').forEach(cb => cb.checked = false);
  document.getElementById('campGrid').innerHTML = '';
  document.getElementById('campCount').textContent = '시설을 선택하면 캠핑장이 필터링됩니다.';
}

function renderCamps(camps) {
  const grid = document.getElementById('campGrid');
  if (camps.length === 0) {
    grid.innerHTML = '<p style="color:#6B7280;grid-column:1/-1;">해당 조건의 캠핑장이 없습니다.</p>';
    return;
  }
  grid.innerHTML = camps.slice(0, 60).map(c => {
    const img = c.firstImageUrl
      ? `<img class="camp-card-img" src="${c.firstImageUrl}" alt="${c.facltNm}" loading="lazy">`
      : `<div class="camp-card-img-placeholder">⛺</div>`;
    return `<a class="camp-card" href="/camp/${c.slug}/">
      ${img}
      <div class="camp-card-body">
        <div class="camp-card-name">${c.facltNm}</div>
        <div class="camp-card-loc">📍 ${c.doNm ? c.doNm.replace(/특별자치도|광역시|특별시|특별자치시/, '') : ''} ${c.sigunguNm || ''}</div>
        <div class="camp-card-tags">
          ${c.induty ? `<span class="tag tag-type">${c.induty}</span>` : ''}
          ${c.animalCmgCl && c.animalCmgCl !== '불가' && c.animalCmgCl !== '' ? `<span class="tag tag-pet">🐾</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
  if (camps.length > 60) {
    grid.innerHTML += `<p style="grid-column:1/-1;text-align:center;color:#6B7280;padding:16px;">상위 60개 표시 중 (전체 ${camps.length}개)</p>`;
  }
}
</script>
