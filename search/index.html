---
layout: default
title: 캠핑장 검색 | 우아캠프
description: 전국 캠핑장 이름, 지역, 유형으로 검색하세요.
---

<div class="section">
  <nav class="breadcrumb"><a href="/">홈</a> <span>›</span> <span>캠핑장 검색</span></nav>
  <h1 style="font-size:1.6rem;font-weight:800;margin:20px 0 24px;">🔍 캠핑장 검색</h1>

  <div class="search-wrap" style="max-width:100%;margin-bottom:24px;">
    <input type="text" id="searchInput" class="search-input"
           placeholder="캠핑장명, 지역명, 유형 검색..."
           autocomplete="off" style="border:1px solid #E5E7EB;">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>

  <p id="searchStatus" style="color:#6B7280;font-size:.87rem;margin-bottom:16px;">검색어를 입력하세요.</p>
  <div class="camp-grid" id="campGrid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
let fuse = null;
let allCamps = [];

(async () => {
  const resp = await fetch('/search_index.json');
  allCamps = await resp.json();
  fuse = new Fuse(allCamps, {
    keys: ['facltNm', 'doNm', 'sigunguNm', 'addr1', 'induty', 'lineIntro'],
    threshold: 0.35,
    minMatchCharLength: 1,
  });
  document.getElementById('searchStatus').textContent = `총 ${allCamps.length}개 캠핑장 검색 가능`;

  // URL 파라미터로 검색어 받기
  const q = new URLSearchParams(location.search).get('q');
  if (q) {
    document.getElementById('searchInput').value = q;
    doSearch();
  }
})();

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q || !fuse) return;
  const results = fuse.search(q).slice(0, 50);
  document.getElementById('searchStatus').textContent = `"${q}" 검색 결과: ${results.length}개`;
  const grid = document.getElementById('campGrid');
  if (results.length === 0) {
    grid.innerHTML = '<p style="grid-column:1/-1;color:#6B7280;">검색 결과가 없습니다.</p>';
    return;
  }
  grid.innerHTML = results.map(r => {
    const c = r.item;
    const img = c.firstImageUrl
      ? `<img class="camp-card-img" src="${c.firstImageUrl}" alt="${c.facltNm}" loading="lazy">`
      : `<div class="camp-card-img-placeholder">⛺</div>`;
    return `<a class="camp-card" href="/camp/${c.slug}/">
      ${img}
      <div class="camp-card-body">
        <div class="camp-card-name">${c.facltNm}</div>
        <div class="camp-card-loc">📍 ${c.doNm || ''} ${c.sigunguNm || ''}</div>
        <div class="camp-card-tags">
          ${c.induty ? `<span class="tag tag-type">${c.induty}</span>` : ''}
          ${c.animalCmgCl && c.animalCmgCl !== '불가' && c.animalCmgCl !== '' ? `<span class="tag tag-pet">🐾</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
